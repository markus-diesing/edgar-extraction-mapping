# EDGAR — Azure DevOps CI/CD Pipeline
#
# Prerequisites (one-time setup in ADO):
#   1. Create a service connection named 'sc-lpa-edgar-azure' (Azure Resource Manager,
#      service principal) with at least Contributor on the resource group and
#      AcrPush on the ACR.
#   2. Store the Anthropic API key in Key Vault:
#        az keyvault secret set \
#          --vault-name kv-lpa-edgar-sbx \
#          --name anthropic-api-key \
#          --value "sk-ant-..."
#
# Pipeline stages:
#   Infra  → deploy Bicep (idempotent, safe to run on every push)
#   Build  → build backend + frontend images and push to ACR
#   Deploy → update both Container Apps to the new images

trigger:
  branches:
    include: [develop]

pool:
  vmImage: ubuntu-latest

variables:
  serviceConnection: azure-edgar
  resourceGroup: rg-lpa-edgar-sandbox-germanywestcentral
  acrName: crlpaedgarsandbox
  backendAppName: ca-edgar-backend
  frontendAppName: ca-edgar-frontend

stages:

  # ── Stage 1: Infrastructure ──────────────────────────────────────────────────
  - stage: Infra
    displayName: Deploy infrastructure
    jobs:
      - job: BicepDeploy
        displayName: Deploy Bicep template
        steps:
          - task: AzureCLI@2
            displayName: az deployment group create
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az deployment group create \
                  --resource-group $(resourceGroup) \
                  --template-file infra/main.bicep \
                  --mode Incremental

  # ── Stage 2: Build ───────────────────────────────────────────────────────────
  - stage: Build
    displayName: Build and push images
    dependsOn: Infra
    jobs:
      - job: BuildImages
        displayName: Build backend + frontend
        steps:
          - task: AzureCLI@2
            displayName: Build and push backend
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az acr build \
                  --registry $(acrName) \
                  --image edgar-backend:$(Build.BuildId) \
                  --file Dockerfile \
                  .

          - task: AzureCLI@2
            displayName: Build and push frontend
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az acr build \
                  --registry $(acrName) \
                  --image edgar-frontend:$(Build.BuildId) \
                  --file Dockerfile.frontend \
                  .

  # ── Stage 3: Deploy ──────────────────────────────────────────────────────────
  - stage: Deploy
    displayName: Deploy to Container Apps
    dependsOn: Build
    jobs:
      - job: DeployApps
        displayName: Update Container Apps
        steps:
          - task: AzureCLI@2
            displayName: Install containerapp extension
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az extension add --name containerapp --upgrade --yes

          # Role assignments can take ~30 s to propagate on first deploy
          - bash: sleep 30
            displayName: Wait for role propagation (first deploy)
            condition: eq(variables['Build.Reason'], 'Manual')

          - task: AzureCLI@2
            displayName: Update backend
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az containerapp update \
                  --name $(backendAppName) \
                  --resource-group $(resourceGroup) \
                  --image $(acrName).azurecr.io/edgar-backend:$(Build.BuildId)

          - task: AzureCLI@2
            displayName: Update frontend
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az containerapp update \
                  --name $(frontendAppName) \
                  --resource-group $(resourceGroup) \
                  --image $(acrName).azurecr.io/edgar-frontend:$(Build.BuildId)

          - task: AzureCLI@2
            displayName: Print frontend URL
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az containerapp show \
                  --name $(frontendAppName) \
                  --resource-group $(resourceGroup) \
                  --query properties.configuration.ingress.fqdn \
                  --output tsv
