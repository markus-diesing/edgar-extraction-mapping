# issuer_Citigroup.yaml
#
# Per-issuer extraction hints for: Citigroup Inc
#
# Sources: 000191870426006689 (CUSIP 17332UG26)
#          000191870426007632 (CUSIP 17332UV86)
#          000191870426007610 (CUSIP 17332UX27)
#
# Key finding: Citigroup uses "Final barrier value" (not "Barrier Level"),
# "Coupon barrier value" for the coupon gate, and "Worst performing underlying"
# for worst-of basket language.

issuer_key: Citigroup Inc

aliases:
  cik_patterns:
    - "831001"
  name_match_patterns:
    - Citigroup Inc
    - CITIGROUP INC
    - Citigroup
    - Citi
  entity_names:
    - Citigroup Inc
    - CITIGROUP INC

section_headings:
  - KEY TERMS
  - Payment at maturity
  - Contingent coupon payment dates
  - Potential redemption dates
  - Underlying

key_terms_position: >
  early — "KEY TERMS" section with a distinctive green/teal background header
  (approx. #59AE43). The multi-column underlying table appears within the first
  200 lines. A "Key Terms (continued)" notice signals the section continues
  across pages.

document_structure: >
  Citigroup uses modern HTML with styled tables (flexbox/grid layouts, pixel-precise
  padding). The KEY TERMS section contains a multi-column per-underlying table with
  columns: Underlying | Initial underlying value | Coupon barrier value | Final
  barrier value. Dates (potential redemption dates, contingent coupon payment dates)
  are enumerated explicitly in separate rows. The green/teal header color (#59AE43
  or similar) marks each section boundary.

field_hints:
  barrier.triggerDetails.triggerLevel:
    synonyms:
      - Final barrier value
      - Final Barrier Value
      - barrier value
    label_in_doc: "Final barrier value"
    format: >
      Expressed as percentage of initial underlying value, e.g. "60.00% of initial
      underlying value". Appears as a column in the per-underlying table or as a
      standalone row in KEY TERMS.
    typical_location: Per-underlying sub-table in KEY TERMS section
    _note: >
      "Final barrier value" controls principal loss at maturity — distinct from
      "Coupon barrier value" which controls coupon eligibility. Do not conflate them.

  coupon.rate:
    synonyms:
      - Contingent coupon
      - Contingent coupon rate
      - Contingent Coupon
    label_in_doc: '"Contingent coupon" or "Contingent coupon rate"'
    format: >
      Stated as both monthly and annual rates, e.g. "0.8417% per month (approximately
      10.10% per annum)" or as a dollar amount per $1,000 principal.
    typical_location: KEY TERMS table

  coupon.barrierLevel:
    synonyms:
      - Coupon barrier value
      - Coupon barrier
    label_in_doc: "Coupon barrier value"
    format: >
      Expressed as percentage of initial underlying value, e.g. "70.00% of initial
      underlying value". Controls whether the contingent coupon is paid on each
      valuation date. Separate from "Final barrier value".
    typical_location: Per-underlying sub-table in KEY TERMS section; also a column header

  autocall.callLevel:
    synonyms:
      - Potential redemption dates
      - Potential redemption date
      - Automatic redemption
    label_in_doc: "Potential redemption dates"
    format: >
      Explicit list of dates, e.g. "June 16, 2026, September 16, 2026, …".
      Autocall trigger level is typically 100% of initial underlying value on any
      potential redemption date — not always stated as an explicit percentage.
    typical_location: KEY TERMS table; separate row listing all observation dates

  underlyingTerms.underlyingAssets[*].name:
    synonyms:
      - Underlying
      - Underlying asset
      - Worst performing underlying
    label_in_doc: Underlying (column header in per-underlying table)
    format: >
      Full index or equity name, e.g. "Nasdaq-100 Index®", "MSCI Emerging Markets
      Index". For multi-asset products the worst-of is called "worst performing
      underlying" in payout formulas — extract each underlying separately.
    typical_location: Per-underlying sub-table column header in KEY TERMS

  underlyingTerms.underlyingAssets[*].initialLevel:
    synonyms:
      - Initial underlying value
      - Initial value
      - initial underlying value
    label_in_doc: "Initial underlying value"
    format: >
      Absolute index level or normalised value (e.g. "100.00" or "19,324.56").
      Defined as the closing value on the pricing date. Superscript footnote may
      indicate it is set on the pricing date.
    typical_location: Per-underlying sub-table in KEY TERMS; also in Preliminary Terms

  structuredProductsGeneric.maturityDate:
    synonyms:
      - Maturity date
    label_in_doc: "Maturity date:"
    format: "Date string, e.g. 'March 16, 2029'"
    typical_location: KEY TERMS table

  product.denomination:
    synonyms:
      - Stated principal amount
      - Principal amount
    label_in_doc: "Stated principal amount"
    format: "$1,000 per security"
    typical_location: KEY TERMS table

  identifiers.cusip:
    synonyms:
      - CUSIP
      - CUSIP / ISIN
    label_in_doc: 'CUSIP / ISIN: (combined field row)'
    format: "9-character CUSIP e.g. '17332UG26'"
    typical_location: KEY TERMS table; cover page

  identifiers.isin:
    synonyms:
      - ISIN
    label_in_doc: 'CUSIP / ISIN: (same row as CUSIP)'
    format: "12-character ISIN"
    typical_location: KEY TERMS table

  product.issuePrice:
    synonyms:
      - Issue price
      - Price to public
    label_in_doc: "Issue price"
    format: "100.00% of principal or $1,000 per security; footnoted with cost breakdown"
    typical_location: KEY TERMS table

  structuredProductsGeneric.tradeDate:
    synonyms:
      - Pricing Date
      - Pricing date
      - Trade date
    label_in_doc: '"Pricing date" in KEY TERMS table'
    format: ISO date string YYYY-MM-DD
    typical_location: KEY TERMS table; cover page

  structuredProductsGeneric.issueDate:
    synonyms:
      - Settlement date
      - Issue date
      - Original issue date
    label_in_doc: '"Settlement date" or "Issue date" in KEY TERMS table'
    format: ISO date string YYYY-MM-DD. Typically T+3 from Pricing date.
    typical_location: KEY TERMS table

  structuredProductsGeneric.valuationDate:
    synonyms:
      - Final valuation date
      - Final observation date
      - Determination date
    label_in_doc: >
      The last date in the "Contingent coupon payment dates" / "Potential redemption dates"
      list, or a separately labeled "Final valuation date" row.
    format: ISO date string YYYY-MM-DD
    typical_location: KEY TERMS table; last element of payment date list

  coupon.couponFrequency:
    synonyms:
      - monthly
      - per month
      - Contingent coupon payment dates
    label_in_doc: Implied from explicit monthly listing of "Contingent coupon payment dates"
    format: >
      Citigroup notes in this corpus use quarterly or monthly coupons depending on
      the specific product. Check "Contingent coupon payment dates" cadence.
      Output {"$type": "monthly"} or {"$type": "quarterly"} accordingly.
      CRITICAL: Frequency is a discriminated union — output {"$type": "<value>"},
      not the bare string. See prism_schema_guide.yaml.
    typical_location: KEY TERMS table "Contingent coupon payment dates" row

  autocall.observationFrequency:
    synonyms:
      - Potential redemption dates
      - quarterly
      - monthly
    label_in_doc: Implied from cadence of "Potential redemption dates" list
    format: >
      Derive from the spacing of the Potential redemption dates list.
      Typically quarterly (every ~3 months). Output {"$type": "quarterly"} or
      {"$type": "monthly"} as appropriate. Discriminated union — see prism_schema_guide.yaml.
    typical_location: KEY TERMS table "Potential redemption dates" row

  autocall.callLevel:
    synonyms:
      - Potential redemption dates
      - Automatic early redemption
      - 100% of initial underlying value
    label_in_doc: >
      "Potential redemption dates" row — trigger condition stated in payout formula:
      "if the closing level of each underlying on [date] is greater than or equal to
      its initial underlying value". Implied call level = 1.00 (100%).
    format: Implied 1.00 — extract from payout formula sub-section
    typical_location: KEY TERMS payout formula section (below Potential redemption dates)

  underlyingTerms.underlyingObservation:
    synonyms:
      - worst performing underlying
      - Worst Performing Underlying
      - worst of
    label_in_doc: '"worst performing underlying" in payout formula'
    format: >
      Multi-asset Citigroup products use worst-of. Map to "worstOf".
      Single-underlying products: "single".
    typical_location: KEY TERMS payout formula section

  parties.issuer.name:
    synonyms:
      - Issuer
      - issued by
    label_in_doc: '"Issuer:" row in KEY TERMS or cover page'
    format: "Full legal name: 'Citigroup Global Markets Holdings Inc.' or similar Citi entity"
    typical_location: KEY TERMS table; cover page

  parties.guarantor.name:
    synonyms:
      - Guarantor
      - guaranteed by
    label_in_doc: '"Guarantor:" or "guaranteed by" in KEY TERMS / cover page'
    format: "Typically 'Citigroup Inc.' as guarantor of the issuing subsidiary"
    typical_location: KEY TERMS table; cover page

  parties.calculationAgent.name:
    synonyms:
      - Calculation Agent
    label_in_doc: '"Calculation Agent:" in KEY TERMS'
    format: "Citibank, N.A. or Citigroup Global Markets Inc."
    typical_location: KEY TERMS table

  funding.denomination:
    synonyms:
      - Stated principal amount
      - Principal amount
      - denomination
    label_in_doc: '"Stated principal amount: $1,000 per security"'
    format: "Numeric: 1000"
    typical_location: KEY TERMS table

  funding.issuePricePercent:
    synonyms:
      - Issue price
      - Price to public
    label_in_doc: '"Issue price:" in KEY TERMS'
    format: "100% of principal → 1.00. Footnoted with underwriting discounts."
    typical_location: KEY TERMS table

  structuredProductsGeneric.instrumentCurrency:
    synonyms:
      - USD
      - U.S. dollars
    label_in_doc: Implied — all Citigroup notes in this corpus are USD-denominated
    format: '"USD"'
    typical_location: Throughout the document

  structuredProductsGeneric.settlement:
    synonyms:
      - cash payment
      - cash settlement
    label_in_doc: Implied by payout formula paying "$1,000" or formula amount
    format: '"cash"'
    typical_location: Payout formula in KEY TERMS

  barrier.triggerDetails.observationType:
    synonyms:
      - Final valuation date
      - at maturity
    label_in_doc: >
      "Final barrier value" is assessed on the final valuation date only —
      Citigroup uses European barrier observation.
    format: European — assessed at maturity only (Final Valuation Date)
    typical_location: KEY TERMS payout formula

general_notes: >
  BARRIER vs COUPON BARRIER: Citigroup uses two separate barrier levels.
  "Final barrier value" = principal loss trigger at maturity (e.g. 60%).
  "Coupon barrier value" = coupon eligibility gate on each valuation date (e.g. 70%).
  Both are expressed as percentages of the respective initial underlying value and
  appear as columns in the per-underlying sub-table.

  WORST-OF BASKET LANGUAGE: "Worst performing underlying" — the exact phrase used for
  the basket worst-of reference. Payout formula reads:
    If worst performing underlying final value ≥ final barrier value → $1,000
    If below → $1,000 + ($1,000 × underlying return of worst performing underlying)
  Extract "Underlying return" = (Final Value − Initial Value) / Initial Value.

  AUTOCALL: "Potential redemption dates" lists all observation dates. Trigger level is
  typically 100% of initial underlying value (par call) but may vary — check the
  payout formula sub-section for "if the closing level of each underlying on [date]
  is greater than or equal to its initial underlying value".

  VALUATION DATES: "Contingent coupon payment dates" and "Potential redemption dates"
  are explicitly listed. The final element in the dates list corresponds to the Final
  Valuation Date.

  LAYOUT: Green/teal section headers (#59AE43). Multi-page key terms section with
  "Key Terms (continued)" continuation notice. All percentages rounded to 2 decimal
  places. Hypothetical examples use normalized 100.00 initial values.

# ── Programmatic extraction (Tier 1) ───────────────────────────────────────
# NOTE: Citigroup uses CSS-div layouts in most filings.  The html_extractor
# will attempt table matching but may fall back to LLM for layout-heavy pages.
key_terms_table_heading: "KEY TERMS"

table_labels:
  # Citi uses "Final barrier value" (not "Barrier Level")
  "Final barrier value":              "barrier.triggerDetails.triggerLevel"
  "Final Barrier Value":              "barrier.triggerDetails.triggerLevel"
  "Coupon barrier value":             "coupon.barrierLevel"
  "Coupon Barrier Value":             "coupon.barrierLevel"
  # Underlying label
  "Worst performing underlying":      "underlyingTerms.underlyingAssets[*].name"
  "Underlying":                       "underlyingTerms.underlyingAssets[*].name"
  "Underlying index":                 "underlyingTerms.underlyingAssets[*].name"
  # Coupon
  "Contingent coupon":                "coupon.rate"
  "Contingent Coupon":                "coupon.rate"
  "Contingent Coupon Rate":           "coupon.rate"
  # Dates
  "Pricing date":                     "structuredProductsGeneric.tradeDate"
  "Pricing Date":                     "structuredProductsGeneric.tradeDate"
  "Issue date":                       "structuredProductsGeneric.issueDate"
  "Issue Date":                       "structuredProductsGeneric.issueDate"
  "Maturity date":                    "structuredProductsGeneric.maturityDate"
  "Maturity Date":                    "structuredProductsGeneric.maturityDate"
  "Valuation date":                   "structuredProductsGeneric.valuationDate"
  "Valuation Date":                   "structuredProductsGeneric.valuationDate"
