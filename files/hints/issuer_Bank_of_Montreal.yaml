# issuer_Bank_of_Montreal.yaml
#
# Per-issuer extraction hints for: Bank of Montreal
#
# Structure:
#   aliases:           CIK patterns and name match strings used to detect this issuer
#   section_headings:  Key section headings to locate in the filing HTML
#   key_terms_position: Where to find the primary terms table in the document
#   document_structure: Describes the overall layout of this issuer's filings
#   field_hints:       Per PRISM field — synonyms, label text, format, location
#   general_notes:     High-level notes about this issuer's filing conventions
#
# Sources: 000121465925014523 (p102251424b2.htm), 000183988225055653 (bmo4756_424b2-31767.htm)

issuer_key: Bank of Montreal

aliases:
  cik_patterns:
    - "927971"
  name_match_patterns:
    - Bank of Montreal
    - BANK OF MONTREAL
    - BMO
  entity_names:
    - Bank of Montreal
    - BANK OF MONTREAL /CAN/

section_headings:
  - "Terms of the Notes:"
  - "Specific Terms of the Notes:"
  - "Key Terms of the Notes:"
  - Additional Terms of the Notes
  - Selected Risk Considerations

key_terms_position: >
  early — 'Terms of the Notes' table appears within first 100 lines (cover page),
  followed by 'Specific Terms of the Notes' table, then 'Key Terms of the Notes'
  table on page 2

document_structure: >
  Three-section cover: (1) 'Terms of the Notes' — high-level dates/CUSIP/notional table;
  (2) 'Specific Terms of the Notes' — multi-column term sheet with Reference Assets,
  tickers, Initial Levels, rates, Coupon Barrier Level, Trigger Level;
  (3) 'Key Terms of the Notes' — narrative table on page 2 with definitions

field_hints:
  underlyingTerms.underlyingAssets[*].name:
    synonyms:
      - Reference Assets
      - Reference Asset
    label_in_doc: "Reference Assets:"
    format: "Full name with ticker in quotes: 'The Russell 2000® Index (ticker symbol \"RTY\")'. Multiple assets listed in same cell."
    typical_location: Specific Terms table header row; Key Terms table first row

  underlyingTerms.underlyingAssets[*].ticker:
    synonyms:
      - Ticker Symbol
      - ticker symbol
    label_in_doc: Ticker Symbol column in Specific Terms table
    format: "Exchange ticker, e.g. 'RTY', 'SPX'. Also stated in parentheses: '(ticker symbol \"RTY\")'"
    typical_location: "Specific Terms of the Notes table, 'Ticker Symbol' column"

  underlyingTerms.underlyingAssets[*].initialLevel:
    synonyms:
      - Initial Level
    label_in_doc: "Initial Level column; Initial Level: in Key Terms table"
    format: "Absolute index level, e.g. '2,436.484'"
    typical_location: "Specific Terms table 'Initial Level' column; Key Terms table 'Initial Level' row"

  coupon.rate:
    synonyms:
      - Contingent Interest Rate
    label_in_doc: "Contingent Interest Rate:"
    format: "'0.7083% per month (approximately 8.50% per annum)'. Dollar amount: '$7.083 for each $1,000 in principal amount'"
    typical_location: "Specific Terms table 'Contingent Interest Rate' column; Key Terms table 'Contingent Interest Rate' row"

  coupon.barrierLevel:
    synonyms:
      - Coupon Barrier Level
      - Coupon Barrier
    label_in_doc: "Coupon Barrier Level* (column header); Coupon Barrier Level: (Key Terms row)"
    format: "Absolute level with percentage: '1,949.187, 80.00% of its Initial Level'. Extract 0.80."
    typical_location: "Specific Terms table 'Coupon Barrier Level' column; Key Terms table"

  barrier.triggerDetails.triggerLevel:
    synonyms:
      - Trigger Level
      - Trigger Event
    label_in_doc: "Trigger Level* (column header); Trigger Level: (Key Terms row)"
    format: "Absolute level with percentage: '1,949.187, 80.00% of its Initial Level'. In this issuer's filings, Trigger Level and Coupon Barrier Level are often the same value."
    typical_location: "Specific Terms table 'Trigger Level' column; Key Terms table"

  barrier.triggerDetails.triggerEffect:
    synonyms:
      - Trigger Event
    label_in_doc: "Trigger Event:"
    format: "'A Trigger Event will be deemed to occur if the Final Level of any Reference Asset is less than its Trigger Level on the Valuation Date.' Maps to 'default' in PRISM."
    typical_location: "Key Terms table 'Trigger Event' row"

  coupon.observationDates:
    synonyms:
      - Observation Dates
    label_in_doc: "Observation Dates:"
    format: "'Three trading days prior to each scheduled Contingent Coupon Payment Date'"
    typical_location: Key Terms table

  coupon.paymentDates:
    synonyms:
      - Contingent Coupon Payment Dates
    label_in_doc: "Contingent Coupon Payment Dates:"
    format: "'Interest, if payable, will be paid on the 3rd day of each month (or, if such day is not a business day, the next following business day), beginning on [date] and ending on the Maturity Date.'"
    typical_location: Key Terms table

  structuredProductsGeneral.tradeDate:
    synonyms:
      - Pricing Date
    label_in_doc: "Pricing Date:"
    format: Date string in Terms of the Notes table
    typical_location: Terms of the Notes table, first row

  structuredProductsGeneral.issueDate:
    synonyms:
      - Settlement Date
    label_in_doc: "Settlement Date:"
    format: Date string
    typical_location: Terms of the Notes table and Key Terms table

  structuredProductsGeneral.maturityDate:
    synonyms:
      - Maturity Date
    label_in_doc: "Maturity Date:"
    format: Date string
    typical_location: Terms of the Notes table and Key Terms table

  structuredProductsGeneral.valuationDate:
    synonyms:
      - Valuation Date
    label_in_doc: "Valuation Date:"
    format: Date string
    typical_location: Terms of the Notes table and Key Terms table

  underlyingTerms.underlyingAssets[*].finalLevel:
    synonyms:
      - Final Level
    label_in_doc: "Final Level:"
    format: "'With respect to each Reference Asset, the closing level of that Reference Asset on the Valuation Date.'"
    typical_location: "Key Terms table 'Final Level' row"

  structuredProductsGeneral.notional:
    synonyms:
      - Principal Amount
    label_in_doc: Principal Amount column in Specific Terms table
    format: "Dollar amount, e.g. '$1,372,000.00'"
    typical_location: Specific Terms table

  autocall.observationFrequency:
    synonyms:
      - Call Payment Date
      - Call Payment Dates
      - monthly Call Payment Date
      - Optional Early Redemption Date
    label_in_doc: 'Call Payment Dates: (Key Terms table row)'
    format: >
      "monthly" — Call Payment Dates occur on the 3rd day of each calendar month
      (or next business day). Map to {"$type": "monthly"} in PRISM. IMPORTANT:
      The phrase "we have the right to redeem" describes the contractual mechanism
      for an INDEX-TRIGGERED autocall, not a discretionary issuer call. Redemption
      occurs automatically when EACH Reference Asset closes at or above its Initial
      Level on a Call Payment Date (worst-of condition, call level = 1.00).
    typical_location: Key Terms table "Call Payment Dates" row

  autocall.callLevel:
    synonyms:
      - Optional Early Redemption
      - Call Level
      - Initial Level (autocall trigger)
    label_in_doc: '"Optional Early Redemption" section in Key Terms table'
    format: >
      Implied level = 1.00 (par call). The filing states the trigger as
      "closing level of each Reference Asset is greater than or equal to its
      Initial Level". No explicit percentage label — derive 1.00.
      For yieldEnhancementBarrierCoupon products (no autocall clause): leave null.
    typical_location: Key Terms table "Optional Early Redemption" row

  autocall.callSchedule:
    synonyms:
      - Call Payment Dates
      - Call Payment Date
    label_in_doc: 'Call Payment Dates: (Key Terms table row)'
    format: Array of monthly dates (ISO YYYY-MM-DD), listed in Key Terms table.
    typical_location: Key Terms table "Call Payment Dates" row

  parties.calculationAgent.name:
    synonyms:
      - Calculation Agent
    label_in_doc: "Calculation Agent:"
    format: "'BMOCM' (BMO Capital Markets Corp.)"
    typical_location: Key Terms table

  # ── OTC-specific fields (otcAutocallBarrierCouponSwap model) ───────────────

  identifiers.bmoOtcIdentifier:
    synonyms:
      - BMO OTC Identifier
      - BMO Reference
      - OTC Reference Number
    label_in_doc: Varies — typically in the swap confirmation header.
    format: "String identifier assigned by BMO for bilateral OTC instruments."
    typical_location: Swap confirmation cover page or identifier table.
    _note: Only present on otcAutocallBarrierCouponSwap filings, not standard 424B2 notes.

  identifiers.commonCode:
    synonyms:
      - Common Code
      - Euroclear Code
      - Clearstream Code
    label_in_doc: Common Code (in identifier table alongside ISIN)
    format: "9-digit numeric string, e.g. '123456789'"
    typical_location: Identifier table on cover or term sheet.
    _note: Present on internationally cleared BMO OTC instruments.

  otcDerivativesGeneral.tradeDate:
    synonyms:
      - Trade Date
      - Pricing Date
    label_in_doc: "Trade Date: or Pricing Date:"
    format: ISO date YYYY-MM-DD
    typical_location: OTC swap confirmation header / term sheet.
    _note: >
      In BMO OTC filings, 'Trade Date' or 'Pricing Date' in the confirmation
      header maps to otcDerivativesGeneral.tradeDate (NOT structuredProductsGeneral.initialFixingDate).

  otcDerivativesGeneral.tradedUnits:
    synonyms:
      - Traded Units
      - Number of Units
      - Notional Units
      - Quantity
    label_in_doc: "Traded Units: or Number of Units:"
    format: "String (numeric quantity), e.g. '1000'"
    typical_location: OTC swap confirmation — principal terms table.

  structuredSwap.structuredLegReceiver:
    synonyms:
      - Structured Leg Receiver
      - Counterparty receiving structured leg
    label_in_doc: Varies — derived from swap party roles in the confirmation.
    format: "SwapParty discriminated union — 'buyer' or 'seller'"
    _note: >
      Identifies which swap party (buyer or seller) receives the structured
      leg cashflows. The other party pays the floating/interest leg.

general_notes: >
  Bank of Montreal 424B2 supplements use three layered tables: 'Terms of the Notes'
  (brief dates), 'Specific Terms of the Notes' (multi-column grid), then 'Key Terms of
  the Notes' (narrative). Multiple Reference Assets are common (worst-of structure on
  RTY and SPX). Coupon Barrier Level and Trigger Level are often equal in barrier coupon
  products. Ticker symbols used are exchange tickers (RTY, SPX), not Bloomberg tickers.
  Calculation agent is BMOCM (BMO Capital Markets Corp.). Issuer entity name: Bank of
  Montreal (CIK 927971). Note the 'Contingent Coupons' heading in Key Terms describes
  contingent payment mechanics.

  AUTOCALL SEMANTICS (important): BMO uses the phrase "Optional Early Redemption"
  for its index-triggered autocall feature. Despite the word "we have the right to
  redeem", this is NOT a discretionary issuer call — it is a level-triggered autocall
  that fires automatically when EACH Reference Asset closes at or above its Initial
  Level on any monthly Call Payment Date (worst-of condition). Map to PRISM autocall
  fields with callLevel = 1.00 and observationFrequency = {"$type": "monthly"}.
  Products labelled yieldEnhancementBarrierCoupon (no autocall clause in Key Terms)
  have no autocall — leave all autocall fields null for those.

  OTC PRODUCTS (otcAutocallBarrierCouponSwap model): BMO also files OTC swap
  confirmations for bilateral transactions. These use the otcAutocallBarrierCouponSwap
  model. Key differences from standard 424B2 notes: (1) no funding/structuredProductsGeneral
  block — use otcDerivativesGeneral instead; (2) identifiers include bmoOtcIdentifier
  and/or commonCode (9-digit Euroclear code); (3) a structuredSwap block identifies which
  party receives the structured leg; (4) an interestLeg block describes the floating/fixed
  counterparty leg. The v2 PRISM schema specifically enables these fields (bmoOtcIdentifier,
  commonCode, otcDerivativesGeneral.tradeDate, otcDerivativesGeneral.tradedUnits).

# ── Programmatic extraction (Tier 1) ───────────────────────────────────────
key_terms_table_heading: "Specific Terms of the Notes:"

table_labels:
  # BOM uses standard terminology — mostly covered by cross-issuer map.
  # Adding explicit entries for plural/alternative forms observed in filings.
  "Trigger Level":                    "barrier.triggerDetails.triggerLevel"
  "Coupon Barrier Level":             "coupon.barrierLevel"
  # BOM uses "Pricing Date" for trade date
  "Pricing Date":                     "structuredProductsGeneral.tradeDate"
  "Settlement Date":                  "structuredProductsGeneral.issueDate"
  "Valuation Date":                   "structuredProductsGeneral.valuationDate"
  "Maturity Date":                    "structuredProductsGeneral.maturityDate"
  # Reference assets
  "Reference Asset":                  "underlyingTerms.underlyingAssets[*].name"
  "Reference Assets":                 "underlyingTerms.underlyingAssets[*].name"
  "Initial Level":                    "underlyingTerms.underlyingAssets[*].initialLevel"
  "Ticker Symbol":                    "underlyingTerms.underlyingAssets[*].bloombergTicker"
  # Coupon
  "Contingent Interest Rate":         "coupon.rate"
